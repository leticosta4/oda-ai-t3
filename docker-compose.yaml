version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: ia-t3
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  langchain:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ia-t3-rag
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - OPEN_AI_KEY=${OPEN_AI_KEY}
      - LANGCHAIN_PORT=8002
    ports:
      - "8002:8002"
    depends_on:
      - postgres

volumes:
  postgres_data:
